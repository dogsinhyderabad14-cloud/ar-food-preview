<!DOCTYPE html>
<html>
<head>
  <title>KRUTZ Food AR Menu</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff3e6;
      text-align: center;
    }

    h1 {
      color: #ff5a1f;
      margin-top: 25px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 320px;
      background: white;
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }

    model-viewer {
      width: 100%;
      height: 280px;
      background: #eeeeee;
      border-radius: 15px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      color: green;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
    }

    .ar-btn {
      background: #ff5a1f;
      color: white;
    }

    .order-btn {
      background: #111;
      color: white;
    }

 nav{
    background:#ff5a1f;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

nav h2{
    margin:0;
}

nav div{
    display:flex;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

nav a:hover{
    text-decoration:underline;
} </style>
</head>

</body>

<nav>
    <h2>🍔 KRUTZ FOOD</h2>

    <div>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </div>
</nav>

<p id="cart">🛒 Cart: 0 items</p>
<h1>KRUTZ Food AR Menu</h1>

<div class="menu">

    <div class="card">
      <h2>Chicken Burger</h2>

      <model-viewer
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate>
      </model-viewer>

      <p class="price">₹249</p>

      <button class="ar-btn" onclick="document.querySelectorAll('model-viewer')[0].activateAR()">
        View in AR
      <button class="order-btn" onclick="addToCart('Chicken Burger')">
  Buy Now
</button>
    </div>

    <div class="card">
      <h2>Pizza</h2>

      <model-viewer
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate>
      </model-viewer>

      <p class="price">₹299</p>

      <button class="ar-btn" onclick="document.querySelectorAll('model-viewer')[1].activateAR()">
        View in AR
      </button>

      <button class="order-btn" onclick="addToCart('Pizza')">
    Buy Now
</button>
    </div>

    <div class="card">
      <h2>Coffee</h2>

      <model-viewer
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate>
      </model-viewer>

      <p class="price">₹99</p>

      <button class="ar-btn" onclick="document.querySelectorAll('model-viewer')[2].activateAR()">
        View in AR
      </button>

      <button class="order-btn" onclick="addToCart('Coffee')">
    Buy Now
</button>
    </div>

  </div>

<script>
  let cartCount = 0;

  function addToCart(itemName) {
    cartCount = cartCount + 1;
    document.getElementById("cart").innerHTML = "🛒 Cart: " + cartCount + " items";
    alert(itemName + " added to cart!");
  }
</script>
</body>
</html>
