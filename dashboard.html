<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KRUTZ Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #fff2df;
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    .order {
      background: white;
      padding: 20px;
      margin: 15px auto;
      max-width: 520px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,.15);
    }

    .status {
      font-weight: bold;
      color: green;
    }

    button {
      margin: 6px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .preparing { background: orange; }
    .ready { background: lightgreen; }
    .delivered { background: #111; color: white; }
  </style>
</head>

<body>

<h1>📋 KRUTZ Restaurant Dashboard</h1>

<div id="ordersList">Loading orders...</div>

<script type="module">
  import { db } from "./firebase.js";
  import {
    collection,
    onSnapshot,
    query,
    orderBy,
    doc,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const ordersList = document.getElementById("ordersList");

  const q = query(
    collection(db, "orders"),
    orderBy("createdAt", "desc")
  );

  onSnapshot(q, function(snapshot) {
    ordersList.innerHTML = "";

    if (snapshot.empty) {
      ordersList.innerHTML = "No orders yet.";
      return;
    }

    snapshot.forEach(function(orderDoc) {
      const order = orderDoc.data();
      const id = orderDoc.id;
      const items = order.items || {};

      ordersList.innerHTML += `
        <div class="order">
          <h2>🛎️ New Order</h2>

          <p><b>Order ID:</b> ${id}</p>
          <p><b>Customer:</b> ${order.customerName || "No name"}</p>
          <p><b>Phone:</b> ${order.phoneNumber || "No phone"}</p>
          <p><b>Table:</b> ${order.tableNumber || "No table"}</p>

          <hr>

          <p><b>Burger:</b> ${items.burger || 0}</p>
          <p><b>Pizza:</b> ${items.pizza || 0}</p>
          <p><b>Coffee:</b> ${items.coffee || 0}</p>

          <p><b>Total:</b> ₹${order.totalAmount || 0}</p>
          <p><b>Status:</b> <span class="status">${order.status || "Pending"}</span></p>

          <button class="preparing" onclick="updateStatus('${id}', 'Preparing')">Preparing</button>
          <button class="ready" onclick="updateStatus('${id}', 'Ready')">Ready</button>
          <button class="delivered" onclick="updateStatus('${id}', 'Delivered')">Delivered</button>
        </div>
      `;
    });
  });

  window.updateStatus = async function(id, status) {
    const orderRef = doc(db, "orders", id);
    await updateDoc(orderRef, {
      status: status
    });
  }
</script>

</body>
</html>
