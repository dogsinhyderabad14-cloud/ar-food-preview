<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Dashboard</title>

    <style>

    body{
        font-family:Arial;
        background:#f5f5f5;
        text-align:center;
    }

    .box{
        width:450px;
        margin:40px auto;
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,.2);
    }

    input{
        width:90%;
        padding:12px;
        margin:10px;
        font-size:18px;
    }

    button{
        padding:12px 25px;
        background:#ff5a1f;
        color:white;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:18px;
    }

    </style>

</head>

<body>

<div class="box">

<h1>Restaurant Dashboard</h1>

<input id="foodName" placeholder="Food Name">

<input id="foodPrice" placeholder="Price">

<button onclick="saveFood()">
Save Food
</button>

</div>

<script>

function saveFood(){

let name=document.getElementById("foodName").value;

let price=document.getElementById("foodPrice").value;

localStorage.setItem("foodName",name);

localStorage.setItem("foodPrice",price);

alert("Food Saved Successfully ✅");

}

</script>

</body>

</html>
